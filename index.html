<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Aaratrika 💐</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: radial-gradient(circle at top, #ffe6f0, #ffd6ec, #ffc0cb);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Comic Sans MS', cursive;
}

/* Cat */
.cat {
    width: 180px;
    cursor: pointer;
    transition: transform 0.3s;
}
.cat:hover {
    transform: scale(1.1);
}

/* Bouquet */
.bouquet {
    position: absolute;
    width: 120px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.8s ease;
}
.show {
    opacity: 1;
    transform: scale(1.8);
}

/* Message */
.message {
    position: absolute;
    top: 65%;
    width: 80%;
    text-align: center;
    font-size: 24px;
    color: #ff3b7d;
    opacity: 0;
}
.visible {
    opacity: 1;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #ff4d88;
    font-size: 20px;
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Sparkles */
.sparkle {
    position: absolute;
    color: white;
    font-size: 12px;
    animation: sparkleAnim 2s linear infinite;
}

@keyframes sparkleAnim {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3b7d9c0f67.mp3?filename=dreamy-soft-piano-ambient-110624.mp3">
</audio>

<!-- CAT IMAGE -->
<img src="https://i.imgur.com/8QfQZ7T.png" class="cat" onclick="showSurprise()">

<!-- BOUQUET -->
<img src="https://i.imgur.com/6Xb6X6G.png" class="bouquet" id="bouquet">

<!-- MESSAGE -->
<div class="message" id="message"></div>

<script>
const text = "Dear Aaratrika... A happy bouquet day to my lovely and cutest wifeeeeyyy. I love youuu so sooo sooo soo muchhhh 💖";

function showSurprise() {
    document.getElementById("bouquet").classList.add("show");
    document.getElementById("music").play();

    let i = 0;
    const msg = document.getElementById("message");
    msg.classList.add("visible");

    function type() {
        if (i < text.length) {
            msg.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

/* Hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 250);

/* Sparkles */
function createSparkle() {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.innerText = "✨";
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 2000);
}
setInterval(createSparkle, 300);
</script>

</body>
</html>
