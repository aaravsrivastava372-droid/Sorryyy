<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Aaratrika 💐</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: radial-gradient(circle at top, #ffe6f0, #ffd6ec, #ffc0cb);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Comic Sans MS', cursive;
}

/* CAT */
.cat {
    width: 180px;
    cursor: pointer;
    transition: transform 0.3s;
}
.cat:hover {
    transform: scale(1.1);
}

/* BOUQUET */
.bouquet {
    position: absolute;
    width: 120px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.8s ease;
}
.show {
    opacity: 1;
    transform: scale(2.5);
}

/* MESSAGE */
.message {
    position: absolute;
    top: 65%;
    width: 80%;
    text-align: center;
    font-size: 24px;
    color: #ff3b7d;
    opacity: 0;
}
.visible {
    opacity: 1;
}

/* HEARTS */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* SPARKLES */
.sparkle {
    position: absolute;
    font-size: 14px;
    animation: sparkle 2s linear infinite;
}

@keyframes sparkle {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- CAT -->
<img src="cat.jpg" class="cat" onclick="showSurprise()">

<!-- BOUQUET -->
<img src="bouquet.jpg" class="bouquet" id="bouquet">

<!-- MESSAGE -->
<div class="message" id="message"></div>

<script>
const text = "Dear Aaratrika... A happy bouquet day to my lovely and cutest wifeeeeyyy. I love youuu so sooo sooo soo muchhhh 💖";

function showSurprise() {
    const bouquet = document.getElementById("bouquet");
    const msg = document.getElementById("message");
    const music = document.getElementById("music");

    bouquet.classList.add("show");
    msg.classList.add("visible");

    // Play music
    music.currentTime = 0;
    music.play().catch(() => {});

    // Typewriter effect
    let i = 0;
    msg.innerHTML = "";
    function type() {
        if (i < text.length) {
            msg.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 50);
        }
    }
    type();
}

/* HEARTS */
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 250);

/* SPARKLES */
function createSparkle() {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.innerText = "✨";
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 2000);
}
setInterval(createSparkle, 300);
</script>

</body>
</html>
