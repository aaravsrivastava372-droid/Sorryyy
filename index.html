<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Aaratrika 💐</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: radial-gradient(circle at top, #ffe6f0, #ffd6ec, #ffc0cb);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Comic Sans MS', cursive;
}

/* Cat */
.cat {
    font-size: 100px;
    cursor: pointer;
    transition: transform 0.3s;
}
.cat:hover {
    transform: scale(1.1);
}

/* Bouquet */
.bouquet {
    position: absolute;
    font-size: 60px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.8s ease;
}
.show {
    opacity: 1;
    transform: scale(2);
}

/* Message */
.message {
    position: absolute;
    top: 65%;
    width: 80%;
    text-align: center;
    font-size: 24px;
    color: #ff3b7d;
    opacity: 0;
}
.visible {
    opacity: 1;
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music">
  <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_9466f3b0c6.mp3">
</audio>

<!-- CAT (emoji fallback - always works) -->
<div class="cat" onclick="showSurprise()">🐱</div>

<!-- BOUQUET -->
<div class="bouquet" id="bouquet">💐</div>

<!-- MESSAGE -->
<div class="message" id="message"></div>

<script>
const text = "Dear Aaratrika... A happy bouquet day to my lovely and cutest wifeeeeyyy. I love youuu so sooo sooo soo muchhhh 💖";

function showSurprise() {
    const bouquet = document.getElementById("bouquet");
    const msg = document.getElementById("message");
    const music = document.getElementById("music");

    bouquet.classList.add("show");
    msg.classList.add("visible");

    // Force play audio properly
    music.currentTime = 0;
    music.play().catch(() => {
        console.log("User interaction needed for audio");
    });

    // Typewriter effect
    let i = 0;
    msg.innerHTML = "";
    function type() {
        if (i < text.length) {
            msg.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

/* Hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 250);
</script>

</body>
</html>
